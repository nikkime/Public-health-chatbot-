<!DOCTYPE html>
<html>
<head>
<title>Health AI</title>
<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, purple, blue);
  color: white;
  text-align: center;
  padding: 40px;
}
.card {
  background: rgba(255,255,255,0.2);
  padding: 20px;
  border-radius: 15px;
}
input, button {
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  border: none;
}
button {
  background: black;
  color: white;
}
</style>
</head>

<body>

<h1>🤖 Health AI</h1>

<div class="card">
<form method="POST">
<input name="weight" placeholder="Weight (kg)" required><br>
<input name="height" placeholder="Height (cm)" required><br>
<button type="submit">Calculate BMI</button>
</form>

{% if bmi %}
<h2>BMI: {{bmi}}</h2>
<h3>{{category}}</h3>
{% endif %}
</div>

</body>
</html>
